<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seção Setores — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <script src="../scripts/script.js" defer></script> <!-- defer para carregar o js depois de ler o HTML-->
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Admin
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <div class="page-center">
    <div class="card-secao" style="max-width:560px;">
      <h1>Seção Setores</h1>

      <div class="setores-table-wrap">
        <table id="tabela-setores">
          <thead>
            <tr>
              <th style="text-align:left; padding-left:16px;">Nome do Setor</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-setores">
            <!-- Populado via JS -->
          </tbody>
        </table>
        <span class="error-msg" id="setor-dup-error" style="margin-top:8px;">Este setor já está cadastrado.</span>
      </div>

      <div class="add-setor-row">
        <input type="text" id="novo-setor" placeholder="Nome do Novo Setor" style="flex:1;">
        <button class="btn btn-primary" style="padding:10px 18px; white-space:nowrap;" onclick="adicionarSetor()">+ Adicionar</button>
      </div>

      <div class="secao-actions" style="margin-top:24px;">
        <button class="btn btn-primary" style="padding:12px 40px;" onclick="window.history.back()">Voltar</button>
      </div>
    </div>
  </div>
</body>
</html>
