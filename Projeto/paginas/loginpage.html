<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="../scripts/script.js" defer></script>
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <a href="signuppage.html" class="header-link">Sign Up</a>
  </header>

  <div class="page-center">
    <div class="login-card">
      <h1>Login</h1>
      <div class="form-group form-group--login">
        <label>Email <span class="req">*</span></label>
        <input type="email" placeholder="Digite seu Email" id="email">
        <span class="error-msg" id="email-error">E-mail ou senha incorretos.</span>
      </div>
      <div class="form-group form-group--login">
        <label>Senha <span class="req">*</span></label>
        <input type="password" placeholder="Digite sua senha" id="senha">
      </div>
      <button class="btn btn-primary btn-entrar" onclick="fazerLogin()">Entrar</button>
      <div>
        <i class="fa-brands fa-google google-btn" title="Entrar com Google"></i>
      </div>
    </div>
  </div>
</body>
</html>
