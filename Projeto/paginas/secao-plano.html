<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seção Plano Atual — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <script src="../scripts/script.js" defer></script> <!-- defer para carregar o js depois de ler o HTML-->
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Admin
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <!-- TELA PRINCIPAL: Seção Plano -->
  <div class="page-center" id="tela-plano">
    <div class="card-secao" style="max-width:600px;">
      <h1>Seção Plano Atual</h1>

      <div class="secao-grid">
        <div class="form-group">
          <label>Nome do Plano Atual:</label>
          <input type="text" value="Plano 2" readonly class="readonly-field">
        </div>
        <div class="form-group">
          <label>Data de Contratação:</label>
          <input type="text" value="01/03/2026" readonly class="readonly-field">
        </div>
        <div class="form-group">
          <label>Valor Mensal:</label>
          <input type="text" value="R$169,90/mês" readonly class="readonly-field">
        </div>
        <div class="form-group">
          <label>Data de Vencimento:</label>
          <input type="text" value="01/04/2027" readonly class="readonly-field">
        </div>
      </div>

      <div class="secao-actions">
        <button class="btn btn-outline" style="padding:12px 28px; border-color:var(--text-dark); color:var(--text-dark);" onclick="mostrarCancelar()">Cancelar Plano</button>
        <button class="btn btn-primary" style="padding:12px 28px;" onclick="window.history.back()">Voltar</button>
      </div>
    </div>
  </div>

  <!-- TELA CANCELAMENTO (substitui a principal, fiel ao protótipo) -->
  <div class="page-center" id="tela-cancelar" style="display:none;">
    <div style="background:white; border-radius:20px; padding:48px 56px; width:100%; max-width:560px; box-shadow:0 8px 32px rgba(0,0,0,0.12); text-align:center;">

      <h2 style="font-size:22px; font-weight:700; margin-bottom:8px; line-height:1.4;">
        Seu plano ficará ativo<br>até 01/04/2027
      </h2>
      <h3 style="font-size:20px; font-weight:600; color:var(--text-body); margin-bottom:28px;">
        Reembolso de até 7 dias
      </h3>

      <div class="checkbox-row" style="text-align:left; margin-bottom:28px;">
        <input type="checkbox" id="chk-cancelar" onchange="toggleBtnCancelar()">
        <label for="chk-cancelar">Confirmo que desejo cancelar meu plano e estou ciente das condições</label>
      </div>

      <div style="display:flex; gap:12px; justify-content:center;">
        <button class="btn btn-outline" id="btn-confirmar-cancelar" disabled onclick="confirmarCancelamento()" style="padding:12px 28px; min-width:200px;">
          Confirmar Cancelamento
        </button>
        <button class="btn btn-primary" style="padding:12px 28px; min-width:120px;" onclick="voltarPlano()">Voltar</button>
      </div>
    </div>
  </div>
</body>
</html>
