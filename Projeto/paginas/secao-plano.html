<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seção Plano Atual — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <script src="../scripts/script.js" defer></script>
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Admin
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <!-- TELA PLANO -->
  <div class="page-center" id="tela-plano">
    <div class="card-secao card-secao--sm">
      <h1>Seção Plano Atual</h1>
      <div class="secao-grid">
        <div class="form-group">
          <label>Nome do Plano Atual:</label>
          <input type="text" value="Plano 2" readonly class="readonly-field">
        </div>
        <div class="form-group">
          <label>Data de Contratação:</label>
          <input type="text" value="01/03/2026" readonly class="readonly-field">
        </div>
        <div class="form-group">
          <label>Valor Mensal:</label>
          <input type="text" value="R$169,90/mês" readonly class="readonly-field">
        </div>
        <div class="form-group">
          <label>Data de Vencimento:</label>
          <input type="text" value="01/04/2027" readonly class="readonly-field">
        </div>
      </div>
      <div class="secao-actions">
        <button class="btn btn-outline btn-lg" onclick="mostrarCancelar()">Cancelar Plano</button>
        <button class="btn btn-primary btn-lg" onclick="window.history.back()">Voltar</button>
      </div>
    </div>
  </div>

  <!-- TELA CANCELAMENTO -->
  <div class="page-center oculto" id="tela-cancelar">
    <div class="cancelamento-card">
      <h2 class="cancelamento-titulo">Seu plano ficará ativo<br>até 01/04/2027</h2>
      <h3 class="cancelamento-reembolso">Reembolso de até 7 dias</h3>
      <div class="checkbox-row checkbox-row--mt">
        <input type="checkbox" id="chk-cancelar" onchange="toggleBtnCancelar()">
        <label for="chk-cancelar">Confirmo que desejo cancelar meu plano e estou ciente das condições</label>
      </div>
      <div class="cancelamento-acoes">
        <button class="btn btn-outline" id="btn-confirmar-cancelar" disabled onclick="confirmarCancelamento()">Confirmar Cancelamento</button>
        <button class="btn btn-primary" onclick="voltarPlano()">Voltar</button>
      </div>
    </div>
  </div>
</body>
</html>
