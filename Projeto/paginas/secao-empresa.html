<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seção Empresa — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <script src="../scripts/script.js" defer></script>
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Admin
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <div class="page-center">
    <div class="card-secao">
      <h1>Seção Empresa</h1>
      <div class="secao-grid">
        <div class="secao-col">
          <div class="form-group">
            <label>Nome da Empresa:</label>
            <input type="text" value="Texto Estático – não editável pois está no contrato" readonly class="readonly-field">
          </div>
          <div class="form-group">
            <label>CNPJ:</label>
            <input type="text" value="Texto Estático – não editável" readonly class="readonly-field">
          </div>
          <div class="form-group">
            <label>Código da Empresa:</label>
            <input type="text" value="Texto Estático – não editável, gerado automático" readonly class="readonly-field">
          </div>
          <div class="form-group">
            <label>Nome do Responsável:</label>
            <input type="text" id="responsavel" value="Joaquim Pereira Lima">
          </div>
        </div>
        <div class="secao-col--stretch">
          <div class="form-group">
            <label>Email Corporativo:</label>
            <input type="email" id="email" value="jokaautopeças@hotmail.com">
          </div>
          <div class="form-group">
            <label>Telefone Corporativo:</label>
            <input type="tel" id="telefone" value="+55 (12) 98802-0200">
          </div>
          <div class="logo-secao-wrap">
            <div class="logo-secao-wrap">
              <img id="logo-secao-preview" class="logo-secao-preview" src="" alt="Logo">
              <span id="logo-secao-txt" class="logo-secao-txt">Logo</span>
            </div>
            <button class="btn btn-primary btn-logo" onclick="document.getElementById('logo-secao-input').click()">Alterar Logo</button>
            <input type="file" id="logo-secao-input" accept="image/*" class="input-file-hidden" onchange="previewLogoSecao(event)">
          </div>
        </div>
      </div>
      <div class="secao-actions">
        <button class="btn btn-primary btn-lg" onclick="salvarAlteracoes()">Salvar Alterações</button>
        <button class="btn btn-primary btn-lg" onclick="window.history.back()">Voltar</button>
      </div>
    </div>
  </div>
</body>
</html>
