<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seção Empresa — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <script src="../scripts/script.js" defer></script> <!-- defer para carregar o js depois de ler o HTML-->
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Admin
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <div class="page-center">
    <div class="card-secao">
      <h1>Seção Empresa</h1>

      <div class="secao-grid">
        <!-- Coluna esquerda -->
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div class="form-group">
            <label>Nome da Empresa:</label>
            <input type="text" value="Texto Estático – não editável pois está no contrato" readonly class="readonly-field">
          </div>
          <div class="form-group">
            <label>CNPJ:</label>
            <input type="text" value="Texto Estático – não editável" readonly class="readonly-field">
          </div>
          <div class="form-group">
            <label>Código da Empresa:</label>
            <input type="text" value="Texto Estático – não editável, gerado automático" readonly class="readonly-field">
          </div>
          <div class="form-group">
            <label>Nome do Responsável:</label>
            <input type="text" id="responsavel" value="Joaquim Pereira Lima">
          </div>
        </div>

        <!-- Coluna direita -->
        <div style="display:flex; flex-direction:column; gap:16px; align-items:stretch;">
          <div class="form-group">
            <label>Email Corporativo:</label>
            <input type="email" id="email" value="jokaautopeças@hotmail.com">
          </div>
          <div class="form-group">
            <label>Telefone Corporativo:</label>
            <input type="tel" id="telefone" value="+55 (12) 98802-0200">
          </div>

          <!-- Logo -->
          <div class="logo-secao-wrap">
            <div class="logo-secao-img" id="logo-placeholder-secao">
              <img id="logo-secao-preview" src="" alt="Logo" style="width:86px; height:86px; border-radius:10px; object-fit:cover; display:none;">
              <span id="logo-secao-txt" style="font-size:12px; color:var(--text-muted);">Logo</span>
            </div>
            <button class="btn btn-primary" style="padding:8px 20px; font-size:13px;" onclick="document.getElementById('logo-secao-input').click()">
              Alterar Logo
            </button>
            <input type="file" id="logo-secao-input" accept="image/*" style="display:none" onchange="previewLogoSecao(event)">
          </div>
        </div>
      </div>

      <div class="secao-actions">
        <button class="btn btn-primary" style="padding:12px 32px;" onclick="salvarAlteracoes()">Salvar Alterações</button>
        <button class="btn btn-primary" style="padding:12px 32px;" onclick="window.history.back()">Voltar</button>
      </div>
    </div>
  </div>
</body>
</html>
