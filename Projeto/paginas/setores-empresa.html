<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setores — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <script src="../scripts/script.js" defer></script>
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Administrador
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <div class="page-center">
    <div class="card-setores">
      <h1>Adicione os setores da sua empresa</h1>
      <div class="add-row">
        <div class="form-group">
          <label>Setores <span class="req">*</span></label>
          <input type="text" placeholder="Digite os setores" id="input-setor">
          <span class="error-msg" id="setor-error">Este setor já está cadastrado.</span>
        </div>
        <button class="btn btn-primary btn-add-setor" onclick="adicionarSetor()">+ Adicionar</button>
      </div>
      <div class="setores-lista" id="setores-lista"></div>
      <button class="btn btn-primary btn-full btn-xl" onclick="avancar()">Avançar</button>
    </div>
  </div>
</body>
</html>
