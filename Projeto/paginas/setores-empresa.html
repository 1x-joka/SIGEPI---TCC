<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setores — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .page-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card-setores {
      background: white;
      border-radius: 20px;
      padding: 40px 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      text-align: center;
    }
    .card-setores h1 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    .add-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .add-row input { flex: 1; border-radius: var(--radius-input); }
    .setores-lista { margin-bottom: 24px; }
    .setor-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #f5f5f5;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .setor-item .nome { font-weight: 500; }
    .btn-rm { background: none; border: none; color: var(--text-red); cursor: pointer; font-size: 16px; padding: 2px 6px; }
    .btn-rm:hover { background: #ffebee; border-radius: 6px; }
    .btn-avancar { width: 100%; padding: 12px; font-size: 15px; }
    .error-setor { color: var(--text-red); font-size: 12px; margin-top: 4px; display: none; }
    .error-setor.show { display: block; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Administrador
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <div class="page-center">
    <div class="card-setores">
      <h1>Adicione os setores da sua empresa</h1>

      <div class="add-row">
        <div style="flex:1; display:flex; flex-direction:column;">
          <div class="form-group" style="margin:0;">
            <label>Setores <span class="req">*</span></label>
            <input type="text" placeholder="Digite os setores" id="input-setor">
          </div>
          <span class="error-setor" id="setor-error">Este setor já está cadastrado.</span>
        </div>
        <button class="btn btn-primary" style="align-self:flex-end; padding: 10px 18px;" onclick="adicionarSetor()">+ Adicionar</button>
      </div>

      <div class="setores-lista" id="setores-lista"></div>

      <button class="btn btn-primary btn-avancar" onclick="avancar()">Avançar</button>
    </div>
  </div>

  <script>
    const setores = [];

    function adicionarSetor() {
      const input = document.getElementById('input-setor');
      const erro = document.getElementById('setor-error');
      const nome = input.value.trim();

      if (!nome) return;

      if (setores.includes(nome.toLowerCase())) {
        erro.classList.add('show');
        return;
      }

      erro.classList.remove('show');
      setores.push(nome.toLowerCase());
      renderSetores();
      input.value = '';
    }

    function removerSetor(idx) {
      setores.splice(idx, 1);
      renderSetores();
    }

    function renderSetores() {
      const lista = document.getElementById('setores-lista');
      lista.innerHTML = setores.map((s, i) => `
        <div class="setor-item">
          <span class="nome">${s.charAt(0).toUpperCase() + s.slice(1)}</span>
          <button class="btn-rm" onclick="removerSetor(${i})">✕</button>
        </div>
      `).join('');
    }

    document.getElementById('input-setor').addEventListener('keydown', e => {
      if (e.key === 'Enter') adicionarSetor();
    });

    function avancar() {
      if (setores.length === 0) {
        alert('Adicione pelo menos um setor antes de continuar.');
        return;
      }
      window.location.href = 'planos.html';
    }
  </script>
</body>
</html>
