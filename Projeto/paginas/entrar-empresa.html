<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar na Empresa — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <script src="../scripts/script.js" defer></script> <!-- defer para carregar o js depois de ler o HTML-->
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Funcionário
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <div class="page-center">
    <div class="card-entrar">
      <h1>Entrar na Empresa</h1>
      <p>Código da Empresa</p>

      <div class="form-group" style="text-align:left; margin-bottom:16px;">
        <input type="text" placeholder="Digite o código da empresa" id="codigo">
        <span class="error-msg" id="codigo-error">Código não encontrado. Verifique e tente novamente.</span>
      </div>

      <button class="btn btn-primary btn-full" style="padding:12px; font-size:15px;" onclick="entrarEmpresa()">Entrar</button>
    </div>
  </div>
</body>
</html>
