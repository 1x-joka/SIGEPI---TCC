<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar na Empresa — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .page-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card-entrar {
      background: white;
      border-radius: 20px;
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      text-align: center;
    }
    .card-entrar h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .card-entrar p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .form-group { text-align: left; margin-bottom: 16px; }
    .btn-entrar { width: 100%; padding: 12px; font-size: 15px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <div class="header-right">
      Funcionário
      <div class="avatar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <div class="page-center">
    <div class="card-entrar">
      <h1>Entrar na Empresa</h1>
      <p>Código da Empresa</p>

      <div class="form-group">
        <input type="text" placeholder="Digite o código da empresa" id="codigo">
        <span class="error-msg" id="codigo-error">Código não encontrado. Verifique e tente novamente.</span>
      </div>

      <button class="btn btn-primary btn-entrar" onclick="entrarEmpresa()">Entrar</button>
    </div>
  </div>

  <script>
    function entrarEmpresa() {
      const codigo = document.getElementById('codigo').value.trim();
      const erro = document.getElementById('codigo-error');

      if (!codigo) {
        erro.textContent = 'Digite o código da empresa.';
        erro.classList.add('show');
        return;
      }

      // Em produção: GET /api/empresa/:codigo
      // Simulação: qualquer código válido redireciona
      if (codigo.length >= 4) {
        erro.classList.remove('show');
        window.location.href = 'complementar-funcionario.html';
      } else {
        erro.textContent = 'Código não encontrado. Verifique e tente novamente.';
        erro.classList.add('show');
      }
    }
  </script>
</body>
</html>
