<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — SIGEPI</title>
  <link rel="stylesheet" href="../estilos/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="../scripts/script.js" defer></script> <!-- defer para carregar o js depois de ler o HTML-->
</head>
<body class="layout-flex">
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-title">SIGEPI</span>
      <span class="logo-sub">Gerenciador de EPI Online</span>
    </div>
    <a href="loginpage.html" class="header-link">Login</a>
  </header>

  <div class="page-center">
    <div class="signup-card">
      <h1>Sign Up</h1>

      <div class="form-group form-group-login">
        <label>Nome Completo <span class="req">*</span></label>
        <input type="text" placeholder="Digite seu nome completo" id="nome">
        <span class="error-msg" id="nome-error">Campo obrigatório.</span>
      </div>

      <div class="form-group form-group-login">
        <label>Email <span class="req">*</span></label>
        <input type="email" placeholder="Digite seu email" id="email">
        <span class="error-msg" id="email-error">E-mail inválido.</span>
      </div>

      <div class="form-group form-group-login">
        <label>Senha <span class="req">*</span></label>
        <input type="password" placeholder="Digite sua senha (min 8 dígitos)" id="senha">
        <span class="error-msg" id="senha-error">Mínimo 8 caracteres.</span>
      </div>

      <div class="form-group form-group-login">
        <label>CPF <span class="req">*</span></label>
        <input type="text" placeholder="Digite seu CPF" id="cpf" maxlength="14">
        <span class="error-msg" id="cpf-error">CPF inválido.</span>
      </div>

      <button class="btn btn-primary btn-full" style="margin-top:8px; padding:12px; font-size:15px;" onclick="cadastrar()">Cadastrar</button>

      <div>
        <i class="fa-brands fa-google google-btn" title="Cadastrar com Google"></i>
      </div>
    </div>
  </div>
</body>
</html>
