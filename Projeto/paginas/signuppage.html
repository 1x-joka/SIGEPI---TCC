<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Sign Up</title>
</head>
<body>
    <header>
        <a href="loginpage.html">Login</a>
        <div class="img">
            <img src="../imagens/logo.png" alt="LOGO">
        </div>
    </header>
    <div class="container">
        <h1>Sign Up</h1>

        <form>
            <input type="text" name="name" placeholder="Nome" class="name" title="Preencha seu nome completo" required>
            <input type="email" name="email" placeholder="Email" class="email" title="Preencha seu email" required>
            <input type="password" name="password" placeholder="Senha" class="password" title="Insira sua senha" required>
            <input type="button" class="cadastrar" value="Cadastrar">
        </form>
 
       <a href="" id="google" class="iconesign"> <i class="fa-brands fa-google"></i></a>
    </div>
</body>
</html>
